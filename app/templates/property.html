{% extends 'base.html' %}

{% block main %}

<div class="b_card">
    <div class="b_photo">
        <img src="{{ url_for('get_images', filename=property.photo)}}" style="max-width: 200px;">
    </div>
    <div class="body_card">
        <h2>
            {{property.title}}
        </h2>
        <div>
        <tag>
            {{property.price}}
        </tag>
        <tag>
            {{property.property_type}}
        </tag>
        </div>
        <div>
            {{property.description}}
        </div>
        <div>
            <tag>
                {{property.bedrooms}}
            </tag>
            <tag>
                {{property.bathrooms}}
            </tag>
        </div>
        <div>
            {{property.location}}
        </div>
        <div>
            <a href="{{ url_for('contact') }}" class="btn btn-secondary">Email Realtor</a>
        </div>
    </div>
</div>

{% endblock %}
